<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 148">

  <!-- Code block background -->
  <rect x="12" y="12" width="220" height="126" rx="8" fill="#1e293b"/>

  <!-- Loop statement highlight -->
  <rect x="18" y="18" width="208" height="23" rx="3" fill="rgba(192,132,252,0.3)"/>

  <!-- Body highlight (two lines) -->
  <rect x="37" y="50" width="155" height="23" rx="3" fill="rgba(52,211,153,0.25)"/>
  <rect x="37" y="80" width="138" height="23" rx="3" fill="rgba(52,211,153,0.25)"/>

  <!-- After-loop highlight -->
  <rect x="18" y="112" width="152" height="23" rx="3" fill="rgba(251,191,36,0.25)"/>

  <text font-family="monospace" font-size="15">
    <tspan x="22" y="35" fill="#c084fc">for </tspan><tspan fill="#e2e8f0">i in range(3):</tspan>
  </text>
  <text font-family="monospace" font-size="15" x="40" y="66" fill="#6ee7b7">print(i)</text>
  <text font-family="monospace" font-size="15" x="40" y="96" fill="#6ee7b7">print("---")</text>
  <text font-family="monospace" font-size="15" x="22" y="129" fill="#fbbf24">print("done")</text>

  <!-- Arrow: loop statement -->
  <line x1="247" y1="30" x2="236" y2="30" stroke="#7c3aed" stroke-width="1.8"/>
  <polygon points="228,30 236,25.5 236,34.5" fill="#7c3aed"/>
  <text x="252" y="26" font-family="sans-serif" font-size="13" fill="#5b21b6" font-weight="700">loop statement</text>
  <text x="252" y="40" font-family="sans-serif" font-size="11" fill="#7c3aed">(runs once, sets up the loop)</text>

  <!-- Brace for body -->
  <line x1="205" y1="50" x2="215" y2="50" stroke="#059669" stroke-width="1.5"/>
  <line x1="215" y1="50" x2="215" y2="103" stroke="#059669" stroke-width="1.5"/>
  <line x1="215" y1="103" x2="205" y2="103" stroke="#059669" stroke-width="1.5"/>
  <line x1="215" y1="76" x2="247" y2="76" stroke="#059669" stroke-width="1.8"/>
  <polygon points="239,76 247,71.5 247,80.5" fill="#059669"/>
  <text x="252" y="71" font-family="sans-serif" font-size="13" fill="#065f46" font-weight="700">body</text>
  <text x="252" y="85" font-family="sans-serif" font-size="11" fill="#059669">(indented — repeats each time)</text>

  <!-- Arrow: after loop -->
  <line x1="247" y1="124" x2="178" y2="124" stroke="#b45309" stroke-width="1.8"/>
  <polygon points="170,124 178,119.5 178,128.5" fill="#b45309"/>
  <text x="252" y="120" font-family="sans-serif" font-size="13" fill="#92400e" font-weight="700">after the loop</text>
  <text x="252" y="134" font-family="sans-serif" font-size="11" fill="#b45309">(not indented — runs once at end)</text>

</svg>
