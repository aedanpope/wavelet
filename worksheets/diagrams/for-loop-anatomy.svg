<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 148">

  <!-- Code block background -->
  <rect x="12" y="12" width="220" height="126" rx="8" fill="#1e293b"/>

  <!-- Loop statement highlight -->
  <rect x="18" y="18" width="214" height="23" rx="3" fill="rgba(192,132,252,0.3)"/>

  <!-- Body highlight: single rect, both lines -->
  <rect x="18" y="50" width="214" height="56" rx="3" fill="rgba(52,211,153,0.2)"/>

  <!-- After-loop highlight -->
  <rect x="18" y="115" width="152" height="23" rx="3" fill="rgba(251,191,36,0.25)"/>

  <!-- Code text -->
  <text font-family="monospace" font-size="15">
    <tspan x="22" y="35" fill="#c084fc">for </tspan><tspan fill="#e2e8f0">i in [1, 2, 3]:</tspan>
  </text>
  <text font-family="monospace" font-size="15" x="40" y="66" fill="#6ee7b7">print(i)</text>
  <text font-family="monospace" font-size="15" x="40" y="96" fill="#6ee7b7">print("---")</text>
  <text font-family="monospace" font-size="15" x="22" y="129" fill="#fbbf24">print("done")</text>

  <!-- Arrow: loop statement -->
  <line x1="247" y1="30" x2="236" y2="30" stroke="#7c3aed" stroke-width="1.8"/>
  <polygon points="228,30 236,25.5 236,34.5" fill="#7c3aed"/>
  <text x="252" y="35" font-family="sans-serif" font-size="13" fill="#5b21b6" font-weight="700">loop statement</text>

  <!-- Brace + arrow: body -->
  <line x1="205" y1="52" x2="213" y2="52" stroke="#059669" stroke-width="1.5"/>
  <line x1="213" y1="52" x2="213" y2="104" stroke="#059669" stroke-width="1.5"/>
  <line x1="213" y1="104" x2="205" y2="104" stroke="#059669" stroke-width="1.5"/>
  <line x1="213" y1="78" x2="247" y2="78" stroke="#059669" stroke-width="1.8"/>
  <polygon points="239,78 247,73.5 247,82.5" fill="#059669"/>
  <text x="252" y="83" font-family="sans-serif" font-size="13" fill="#065f46" font-weight="700">body</text>

  <!-- Arrow: after the loop -->
  <line x1="247" y1="127" x2="178" y2="127" stroke="#b45309" stroke-width="1.8"/>
  <polygon points="170,127 178,122.5 178,131.5" fill="#b45309"/>
  <text x="252" y="132" font-family="sans-serif" font-size="13" fill="#92400e" font-weight="700">after the loop</text>

</svg>
