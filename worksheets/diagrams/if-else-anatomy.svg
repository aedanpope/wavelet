<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 140">

  <!-- Code block background -->
  <rect x="12" y="12" width="210" height="116" rx="8" fill="#1e293b"/>

  <!-- if body highlight -->
  <rect x="37" y="43" width="101" height="23" rx="3" fill="rgba(52,211,153,0.25)"/>

  <!-- else body highlight -->
  <rect x="37" y="97" width="118" height="23" rx="3" fill="rgba(251,146,60,0.25)"/>

  <!-- Line 1: if n > 10: -->
  <text font-family="monospace" font-size="15">
    <tspan x="22" y="30" fill="#c084fc">if </tspan><tspan fill="#e2e8f0">n &gt; 10:</tspan>
  </text>

  <!-- Line 2:   print("Big number") -->
  <text font-family="monospace" font-size="15" x="40" y="59" fill="#6ee7b7">print("Big")</text>

  <!-- Line 3: else: -->
  <text font-family="monospace" font-size="15" x="22" y="89" fill="#c084fc">else:</text>

  <!-- Line 4:   print("Small number") -->
  <text font-family="monospace" font-size="15" x="40" y="113" fill="#fb923c">print("Small")</text>

  <!-- "runs when True" label -->
  <line x1="237" y1="55" x2="147" y2="55" stroke="#059669" stroke-width="1.8"/>
  <polygon points="138,55 147,50.5 147,59.5" fill="#059669"/>
  <text x="242" y="51" font-family="sans-serif" font-size="12" fill="#065f46" font-weight="700">runs when</text>
  <text x="242" y="64" font-family="sans-serif" font-size="12" fill="#065f46" font-weight="700">condition True</text>

  <!-- "runs when False" label -->
  <line x1="237" y1="109" x2="164" y2="109" stroke="#ea580c" stroke-width="1.8"/>
  <polygon points="155,109 164,104.5 164,113.5" fill="#ea580c"/>
  <text x="242" y="105" font-family="sans-serif" font-size="12" fill="#9a3412" font-weight="700">runs when</text>
  <text x="242" y="118" font-family="sans-serif" font-size="12" fill="#9a3412" font-weight="700">condition False</text>

</svg>
