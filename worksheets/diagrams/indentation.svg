<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 130">

  <!-- Code block background -->
  <rect x="12" y="12" width="180" height="106" rx="8" fill="#1e293b"/>

  <!-- Indentation highlight column (body lines only) -->
  <rect x="18" y="42" width="18" height="40" rx="2" fill="rgba(96,165,250,0.5)"/>

  <!-- Code text -->
  <text font-family="monospace" font-size="15" x="22" y="30" fill="#e2e8f0">for i in [1, 2, 3]:</text>
  <text font-family="monospace" font-size="15" x="36" y="58" fill="#6ee7b7">print(i)</text>
  <text font-family="monospace" font-size="15" x="36" y="82" fill="#6ee7b7">print("---")</text>
  <text font-family="monospace" font-size="15" x="22" y="110" fill="#fbbf24">print("done")</text>

  <!-- Left brace: indented lines -->
  <line x1="18" y1="42" x2="10" y2="42" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="10" y1="42" x2="10" y2="82" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="10" y1="82" x2="18" y2="82" stroke="#3b82f6" stroke-width="1.5"/>

  <!-- Arrow: indentation -->
  <line x1="200" y1="62" x2="40" y2="62" stroke="#e2e8f0" stroke-width="1.8"/>
  <polygon points="32,62 40,57.5 40,66.5" fill="#e2e8f0"/>
  <text x="205" y="55" font-family="sans-serif" font-size="13" fill="#1d4ed8" font-weight="700">indentation</text>
  <text x="205" y="69" font-family="sans-serif" font-size="11" fill="#3b82f6">2 spaces → inside the loop</text>

  <!-- Divider line -->
  <line x1="18" y1="93" x2="196" y2="93" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Arrow: no indentation -->
  <line x1="200" y1="110" x2="30" y2="110" stroke="#e2e8f0" stroke-width="1.8"/>
  <polygon points="22,110 30,105.5 30,114.5" fill="#e2e8f0"/>
  <text x="205" y="103" font-family="sans-serif" font-size="13" fill="#92400e" font-weight="700">no indentation</text>
  <text x="205" y="117" font-family="sans-serif" font-size="11" fill="#b45309">no spaces → outside the loop</text>

</svg>
